name: Meta Harness Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SITE_GATE_BROWSER_PATH: /usr/bin/google-chrome
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install package metadata
        run: npm install --ignore-scripts

      - name: Run repository check
        run: npm run check

      - name: Check diff whitespace
        run: git diff --check
